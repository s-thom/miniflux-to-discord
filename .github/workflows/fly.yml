name: Fly

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy (${{ matrix.fly-config }})
    runs-on: ubuntu-latest
    if: ${{ (github.ref == 'refs/heads/main') && github.event_name == 'push' }}
    strategy:
      matrix:
        fly-config:
          - fly.toml
          - fly-two.toml

    concurrency:
      group: "deploy-${{ matrix.fly-config }}"
      cancel-in-progress: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --config "${{ matrix.fly-config }}" --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
